<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Design Arts | Order Tracking</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div class="container">
    <h1><i class="fas fa-truck"></i> Design Arts – Order Tracking</h1>
    <p>Enter your Purchase Order No or Product Code</p>

    <!-- ===== Search by PO ===== -->
    <div class="search-box">
      <input
        type="text"
        id="poInput"
        placeholder="Enter Purchase Order Number"
        aria-label="Enter Purchase Order Number"
      />
      <button type="button" id="trackPoBtn" aria-label="Track by PO">
        <i class="fas fa-search"></i> Track Order
      </button>
    </div>

    <!-- ===== Search by Product code ===== -->
    <div class="search-box">
      <input
        type="text"
        id="productInput"
        placeholder="Enter Product Name"
        aria-label="Enter Product Code"
      />
      <button type="button" id="trackProductBtn" aria-label="Track by Product Code">
        <i class="fas fa-search"></i> Track Order
      </button>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="hidden">
      <i class="fas fa-spinner fa-spin"></i> Tracking your order...
    </div>

    <!-- Status Section -->
    <div id="statusSection" class="hidden" aria-live="polite">
      <h2>Order Status</h2>

      <div id="cautionBox" class="caution hidden"></div>

      <div class="progress">
        <div class="step active" id="step-printing">
          <i class="fas fa-print"></i>
          <span>Printing</span>
        </div>
        <div class="step" id="step-pasting">  
          <i class="fas fa-sticky-note"></i>
          <span>Pasting</span>
        </div>
        <div class="step" id="step-lamination">  
          <i class="fas fa-layer-group"></i>
          <span>Lamination</span>
        </div>
        <div class="step" id="step-cutting">    
          <i class="fas fa-cut"></i>
          <span>Cutting</span>
        </div>
        <div class="step" id="step-packing">    
          <i class="fas fa-box"></i>
          <span>Packing</span>
        </div>
        <div class="step" id="step-dispatch">  
          <i class="fas fa-shipping-fast"></i>
          <span>Dispatch</span>
        </div>
      </div>
      
      <!-- Dispatch Details -->
      <div id="dispatchDetails" class="dispatch-box hidden" aria-labelledby="dispatch-title">
        <h3 id="dispatch-title">Dispatch Details</h3>
        <!-- Dynamic content here -->
      </div>
    </div>

    <p id="errorMsg" class="error hidden" role="alert"></p>
  </div>

      <!-- Footer -->
    <footer>
        <p>&copy; 2026 Design Arts. All rights reserved.</p>
    </footer>

  <script src="../js/utils.js"></script>
  <script src="track.js"></script>

</body>

</html>
