<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Design Arts | Admin Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container dashboard-container">  <!-- Main container starts -->
    <h1>Admin Dashboard</h1>

    <!-- New Order Form -->
    <div class="card">
      <h2>Create New Order</h2>
      <div class="form-group">
        <input type="text" id="newPO" placeholder="Purchase Order No" />
        <input type="text" id="newProductCode" placeholder="Product Name" />
        <button onclick="createOrder()">Create Order</button>
      </div>
    </div>

    <!-- Search Section -->
    <div class="search-section">
  <input type="text" id="searchPO" placeholder="Search by PO number">
  <input type="text" id="searchCode" placeholder="Search by Product Code">
  <button onclick="searchOrders()">Search</button>
  <button onclick="loadOrders()">Reset</button>
</div>

    <!-- Orders List (Replaces Table) -->
    <div class="card">
      <h2>Orders</h2>
      <div id="ordersList" class="orders-list">
        <!-- Orders will be dynamically inserted as cards here -->
      </div>
    </div>
  </div>  <!-- Main container ends -->

  <!-- Footer (now outside container, at page bottom) -->
  <footer>
    <p>&copy; 2026 Design Arts. All rights reserved.</p>
  </footer>

  <script src="utils.js"></script>
  <script src="admin.js"></script>
</body>
</html>
